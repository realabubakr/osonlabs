<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="100%" height="100%">
  <defs>
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </radialGradient>
    <linearGradient id="primary-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="teal-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2DD4BF"/>
      <stop offset="100%" stop-color="#0D9488"/>
    </linearGradient>
    <linearGradient id="phone-glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#2DD4BF" stop-opacity="0"/>
    </linearGradient>
    <filter id="drop-shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="12" stdDeviation="15" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <style>
    .title { font-family: 'Inter', system-ui, sans-serif; font-weight: 900; fill: #FFFFFF; }
    .card-title { font-family: 'Inter', system-ui, sans-serif; font-weight: 800; fill: #FFFFFF; }
    .body { font-family: 'Inter', system-ui, sans-serif; font-weight: 500; fill: #94A3B8; line-height: 1.4; }
    .app-text { font-family: 'Inter', system-ui, sans-serif; fill: #FFFFFF; }
  </style>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bg-grad)"/>

  <!-- Slide Header -->
  <text x="100" y="120" class="title" font-size="56" letter-spacing="-0.02em">
    App Visuals: <tspan fill="#2DD4BF">Premium Telegram Mini App</tspan>
  </text>
  <line x1="100" y1="160" x2="1820" y2="160" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>

  <!-- LEFT: App Details & Explanations -->
  <g transform="translate(100, 220)" filter="url(#drop-shadow)">
    <rect width="840" height="720" rx="24" fill="rgba(15, 23, 42, 0.45)" stroke="rgba(255,255,255,0.05)" stroke-width="1.5"/>
    
    <!-- Feature 1 -->
    <g transform="translate(60, 60)">
      <rect width="50" height="50" rx="12" fill="rgba(59, 130, 246, 0.15)" stroke="#3B82F6" stroke-width="1.5"/>
      <path d="M 20,25 H 30 M 25,20 V 30" stroke="#3B82F6" stroke-width="3" stroke-linecap="round"/>
      <text x="80" y="35" class="card-title" font-size="24">Unified Search &amp; AI Scanner</text>
      <text x="80" y="70" class="body" font-size="18">A clean search bar with an integrated camera icon. Patients can type test names or instantly scan paper prescriptions with one tap.</text>
    </g>

    <!-- Feature 2 -->
    <g transform="translate(60, 260)">
      <rect width="50" height="50" rx="12" fill="rgba(45, 212, 191, 0.15)" stroke="#2DD4BF" stroke-width="1.5"/>
      <path d="M 17,25 L 22,30 L 33,18" fill="none" stroke="#2DD4BF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="80" y="35" class="card-title" font-size="24">Yandex.Maps Address Selector</text>
      <text x="80" y="70" class="body" font-size="18">Embedded interactive Yandex Map with automatic geolocation. Drag the pin, and the app reverse-geocodes the coordinates to a street address.</text>
    </g>

    <!-- Feature 3 -->
    <g transform="translate(60, 460)">
      <rect width="50" height="50" rx="12" fill="rgba(99, 102, 241, 0.15)" stroke="#6366F1" stroke-width="1.5"/>
      <path d="M 18,22 C 18,17 32,17 32,22 C 32,32 18,32 18,32 Z" fill="none" stroke="#6366F1" stroke-width="3"/>
      <text x="80" y="35" class="card-title" font-size="24">Mening Salomatligim (My Health) Dashboard</text>
      <text x="80" y="70" class="body" font-size="18">A unified dashboard that aggregates past results from different labs. Plots HbA1c, Cholesterol, and TSH trends in an interactive SVG line chart.</text>
    </g>
  </g>

  <!-- RIGHT: Vector Smartphone Mockup with App UI -->
  <g transform="translate(1220, 180)" filter="url(#drop-shadow)">
    <!-- Phone Shadow/Glow -->
    <rect x="-15" y="-15" width="530" height="850" rx="48" fill="none" stroke="url(#teal-grad)" stroke-width="4" opacity="0.2" filter="url(#glow)"/>
    
    <!-- Phone Body Frame -->
    <rect x="0" y="0" width="500" height="820" rx="40" fill="#0B0F19" stroke="#1E293B" stroke-width="8"/>
    
    <!-- Notch/Speaker -->
    <rect x="180" y="15" width="140" height="24" rx="12" fill="#1E293B"/>

    <!-- Screen Area -->
    <g transform="translate(16, 50)">
      <clipPath id="screen-clip">
        <rect width="468" height="740" rx="24"/>
      </clipPath>
      <rect width="468" height="740" rx="24" fill="#0B132B" clip-path="url(#screen-clip)"/>

      <!-- App Header -->
      <g transform="translate(0, 0)" clip-path="url(#screen-clip)">
        <rect width="468" height="60" fill="rgba(15, 23, 42, 0.9)"/>
        <text x="24" y="38" class="app-text" font-weight="900" font-size="18" fill="#FFFFFF">OSON<tspan fill="#3B82F6">MED</tspan></text>
        <circle cx="420" cy="30" r="16" fill="rgba(255,255,255,0.05)"/>
        <text x="420" y="35" class="app-text" font-weight="700" font-size="12" text-anchor="middle" fill="#2DD4BF">A</text>
      </g>

      <!-- App Content: Mening Salomatligim Tab -->
      <g transform="translate(20, 80)" clip-path="url(#screen-clip)">
        <text x="10" y="30" class="app-text" font-weight="800" font-size="18" fill="#FFFFFF">Mening Salomatligim</text>
        <text x="10" y="52" class="app-text" font-size="11" fill="#94A3B8">Diabetes &amp; Lipid Trends (Intermed &amp; Diyomed)</text>

        <!-- Biomarker Tabs -->
        <g transform="translate(10, 70)">
          <rect width="408" height="42" rx="8" fill="rgba(0,0,0,0.2)" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
          <!-- Active HbA1c -->
          <rect x="3" y="3" width="130" height="36" rx="6" fill="#3B82F6"/>
          <text x="68" y="25" class="app-text" font-weight="700" font-size="12" text-anchor="middle" fill="#FFFFFF">HbA1c (6.8%)</text>
          
          <text x="204" y="25" class="app-text" font-weight="700" font-size="12" text-anchor="middle" fill="#94A3B8">TSH (2.3)</text>
          <text x="340" y="25" class="app-text" font-weight="700" font-size="12" text-anchor="middle" fill="#94A3B8">Lipids (3.4)</text>
        </g>

        <!-- Chart Card -->
        <g transform="translate(10, 130)">
          <rect width="408" height="230" rx="16" fill="rgba(15, 23, 42, 0.45)" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
          <text x="20" y="30" class="app-text" font-weight="800" font-size="14" fill="#FFFFFF">HbA1c Level Trend</text>
          
          <!-- SVG Line Chart (Miniaturized) -->
          <path d="M 40,160 L 140,140 L 240,170 L 340,110" fill="none" stroke="#2DD4BF" stroke-width="4" stroke-linecap="round"/>
          <!-- Dots -->
          <circle cx="40" cy="160" r="5" fill="#2DD4BF"/>
          <circle cx="140" cy="140" r="5" fill="#2DD4BF"/>
          <circle cx="240" cy="170" r="5" fill="#2DD4BF"/>
          <circle cx="340" cy="110" r="6" fill="#EF4444" stroke="#0B132B" stroke-width="2"/>
          
          <!-- Values -->
          <text x="40" y="145" class="app-text" font-weight="700" font-size="10" text-anchor="middle" fill="#94A3B8">7.4%</text>
          <text x="140" y="125" class="app-text" font-weight="700" font-size="10" text-anchor="middle" fill="#94A3B8">7.1%</text>
          <text x="240" y="155" class="app-text" font-weight="700" font-size="10" text-anchor="middle" fill="#94A3B8">6.5%</text>
          <text x="340" y="95" class="app-text" font-weight="800" font-size="11" text-anchor="middle" fill="#EF4444">6.8%</text>

          <text x="40" y="195" class="app-text" font-size="9" text-anchor="middle" fill="#64748B">Jul 25</text>
          <text x="140" y="195" class="app-text" font-size="9" text-anchor="middle" fill="#64748B">Oct 25</text>
          <text x="240" y="195" class="app-text" font-size="9" text-anchor="middle" fill="#64748B">Jan 26</text>
          <text x="340" y="195" class="app-text" font-size="9" text-anchor="middle" fill="#64748B">Apr 26</text>
        </g>

        <!-- Next Test Reminder Card -->
        <g transform="translate(10, 380)">
          <rect width="408" height="95" rx="14" fill="rgba(239, 68, 68, 0.08)" stroke="rgba(239, 68, 68, 0.2)" stroke-width="1"/>
          <text x="20" y="28" class="app-text" font-weight="800" font-size="12" fill="#EF4444">⏰ HbA1c test is recommended in 12 days</text>
          <text x="20" y="48" class="app-text" font-size="10" fill="#94A3B8">Your last HbA1c was 6.8% (High) in April 2026.</text>
          <rect x="20" y="60" width="368" height="25" rx="6" fill="#EF4444"/>
          <text x="204" y="76" class="app-text" font-weight="800" font-size="10" text-anchor="middle" fill="#FFFFFF">Schedule Home Visit (1-Click)</text>
        </g>
      </g>

      {/* App Floating Capsule Navigation Bar */}
      <g transform="translate(20, 670)" clip-path="url(#screen-clip)">
        <rect width="428" height="52" rx="26" fill="rgba(15, 23, 42, 0.95)" stroke="rgba(255, 255, 255, 0.08)" stroke-width="1"/>
        
        {/* Tab 1 Inactive */}
        <text x="71" y="38" class="app-text" font-weight="700" font-size="9" text-anchor="middle" fill="#64748B">Tahlillar</text>
        <circle cx="71" cy="20" r="8" fill="none" stroke="#64748B" stroke-width="1.5"/>
        
        {/* Tab 2 Active (Salomatlik) */}
        <rect x="156" y="6" width="116" height="40" rx="20" fill="rgba(37, 99, 235, 0.15)"/>
        <text x="214" y="38" class="app-text" font-weight="800" font-size="9" text-anchor="middle" fill="#3B82F6">Salomatlik</text>
        <path d="M 209,20 H 219" stroke="#3B82F6" stroke-width="2"/>
        
        {/* Tab 3 Inactive */}
        <text x="357" y="38" class="app-text" font-weight="700" font-size="9" text-anchor="middle" fill="#64748B">Profil</text>
        <circle cx="357" cy="20" r="8" fill="none" stroke="#64748B" stroke-width="1.5"/>
      </g>
    </g>
  </g>

  <!-- Slide Footer -->
  <rect x="0" y="1040" width="1920" height="40" fill="rgba(15, 23, 42, 0.6)"/>
  <text x="100" y="1066" font-family="sans-serif" font-size="16" fill="#64748B">OsonMed Ideathon Pitch</text>
  <text x="1820" y="1066" font-family="sans-serif" font-size="16" fill="#64748B" text-anchor="end">Slide 4 / 6</text>
</svg>
