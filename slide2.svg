<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="100%" height="100%">
  <defs>
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </radialGradient>
    <linearGradient id="red-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EF4444"/>
      <stop offset="100%" stop-color="#991B1B"/>
    </linearGradient>
    <filter id="drop-shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="12" stdDeviation="15" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <style>
    .title { font-family: 'Inter', system-ui, sans-serif; font-weight: 900; fill: #FFFFFF; }
    .body { font-family: 'Inter', system-ui, sans-serif; font-weight: 500; fill: #94A3B8; line-height: 1.5; }
    .card-title { font-family: 'Inter', system-ui, sans-serif; font-weight: 800; fill: #FFFFFF; }
    .stat-num { font-family: 'Inter', system-ui, sans-serif; font-weight: 900; fill: #EF4444; }
  </style>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bg-grad)"/>

  <!-- Slide Header -->
  <text x="100" y="120" class="title" font-size="56" letter-spacing="-0.02em">
    The Problem: <tspan fill="#EF4444">Friction in Chronic Care</tspan>
  </text>
  <line x1="100" y1="160" x2="1820" y2="160" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>

  <!-- LEFT COLUMN: The Target Market (Customer Validation) -->
  <g transform="translate(100, 220)" filter="url(#drop-shadow)">
    <!-- Main Card Background -->
    <rect width="780" height="700" rx="24" fill="rgba(15, 23, 42, 0.4)" stroke="rgba(255,255,255,0.05)" stroke-width="1.5"/>
    
    <!-- Big Stat -->
    <text x="60" y="160" class="stat-num" font-size="120" letter-spacing="-0.03em">1.2 Million+</text>
    <text x="60" y="220" class="card-title" font-size="28" fill="#FFFFFF">Chronic Patients in Uzbekistan</text>
    <text x="60" y="270" class="body" font-size="22">Diabetes, Hypertension, and Thyroid patients who require regular, recurring blood diagnostics every 3 to 6 months.</text>

    <!-- Quote / Validation -->
    <rect x="60" y="370" width="660" height="260" rx="16" fill="rgba(239, 68, 68, 0.04)" stroke="rgba(239, 68, 68, 0.15)" stroke-width="1"/>
    <text x="100" y="430" class="card-title" font-size="24" fill="#EF4444">⚠️ Customer Validation (Real Patient Pain):</text>
    
    <text x="100" y="490" class="body" font-size="20" fill="#E2E8F0" font-style="italic">"I have to take HbA1c tests every 3 months. I waste hours traveling</text>
    <text x="100" y="525" class="body" font-size="20" fill="#E2E8F0" font-style="italic">to the clinic, and I have no easy way to track if my sugar levels</text>
    <text x="100" y="560" class="body" font-size="20" fill="#E2E8F0" font-style="italic">are actually improving over the year."</text>
    <text x="100" y="600" class="body" font-size="18" fill="#94A3B8">— Dilshod M., 54, Diabetes Patient in Tashkent</text>
  </g>

  <!-- RIGHT COLUMN: The Core Frictions -->
  <g transform="translate(940, 220)" filter="url(#drop-shadow)">
    <rect width="880" height="700" rx="24" fill="rgba(15, 23, 42, 0.4)" stroke="rgba(255,255,255,0.05)" stroke-width="1.5"/>
    
    <!-- Pain point 1 -->
    <g transform="translate(60, 60)">
      <circle cx="40" cy="40" r="30" fill="rgba(239, 68, 68, 0.1)" stroke="#EF4444" stroke-width="2"/>
      <text x="40" y="48" font-family="sans-serif" font-size="28" font-weight="900" fill="#EF4444" text-anchor="middle">1</text>
      <text x="100" y="32" class="card-title" font-size="26">Extreme Price Opacity</text>
      <text x="100" y="70" class="body" font-size="20">The same test (e.g. TSH or Lipid Panel) varies up to 2.5x in price across different Tashkent labs. Patients have no way to compare.</text>
    </g>

    <!-- Pain point 2 -->
    <g transform="translate(60, 260)">
      <circle cx="40" cy="40" r="30" fill="rgba(239, 68, 68, 0.1)" stroke="#EF4444" stroke-width="2"/>
      <text x="40" y="48" font-family="sans-serif" font-size="28" font-weight="900" fill="#EF4444" text-anchor="middle">2</text>
      <text x="100" y="32" class="card-title" font-size="26">Scattered PDF Medical History</text>
      <text x="100" y="70" class="body" font-size="20">Results are sent as raw PDFs via Telegram. Patients cannot visualize their health trends, leading to poor disease management.</text>
    </g>

    <!-- Pain point 3 -->
    <g transform="translate(60, 460)">
      <circle cx="40" cy="40" r="30" fill="rgba(239, 68, 68, 0.1)" stroke="#EF4444" stroke-width="2"/>
      <text x="40" y="48" font-family="sans-serif" font-size="28" font-weight="900" fill="#EF4444" text-anchor="middle">3</text>
      <text x="100" y="32" class="card-title" font-size="26">Physical Clinic Inconvenience</text>
      <text x="100" y="70" class="body" font-size="20">Elderly or weak chronic patients must commute, wait in infectious queues, and spend valuable time just for a 5-minute blood draw.</text>
    </g>
  </g>

  <!-- Slide Footer -->
  <rect x="0" y="1040" width="1920" height="40" fill="rgba(15, 23, 42, 0.6)"/>
  <text x="100" y="1066" font-family="sans-serif" font-size="16" fill="#64748B">OsonMed Ideathon Pitch</text>
  <text x="1820" y="1066" font-family="sans-serif" font-size="16" fill="#64748B" text-anchor="end">Slide 2 / 6</text>
</svg>
