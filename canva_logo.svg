<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 200" width="100%" height="100%">
  <!-- Scaled and Centered Left Emblem (75% scale, offset vertically to center in 200px height) -->
  <g transform="translate(10, 40) scale(0.75)">
    <!-- Left 'C' Shape -->
    <path d="M 150 0 L 80 0 A 80 80 0 0 0 80 160 L 150 160 L 150 120 L 80 120 A 40 40 0 0 1 80 40 L 150 40 Z" fill="#2563eb" />
    
    <!-- Right 'C' Shape (reversed) -->
    <path d="M 210 0 L 210 40 L 280 40 A 40 40 0 0 1 280 120 L 210 120 L 210 160 L 280 160 A 80 80 0 0 0 280 0 Z" fill="#2563eb" />
    
    <!-- Central Plus Sign (Medical Cross) -->
    <path d="M 165 35 L 195 35 L 195 65 L 225 65 L 225 95 L 195 95 L 195 125 L 165 125 L 165 95 L 135 95 L 135 65 L 165 65 Z" fill="#2563eb" />
  </g>
  
  <!-- Right Wordmark (Inline Layout with large safe padding) -->
  <text x="320" y="135" font-family="'Outfit', 'Montserrat', 'Inter', sans-serif" font-size="100px" font-weight="900" letter-spacing="0.02em">
    <tspan fill="#ffffff">OSON</tspan><tspan fill="#2563eb">MED</tspan>
  </text>
</svg>
