<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </radialGradient>
    
    <!-- Button/Accent Gradients -->
    <linearGradient id="primary-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="teal-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2DD4BF"/>
      <stop offset="100%" stop-color="#0D9488"/>
    </linearGradient>
    <linearGradient id="glow-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#2DD4BF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </linearGradient>

    <!-- Drop Shadow Filter -->
    <filter id="drop-shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="12" stdDeviation="15" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <style>
    .title { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 900; fill: #FFFFFF; }
    .subtitle { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 500; fill: #94A3B8; }
    .accent { fill: #3B82F6; }
    .teal { fill: #2DD4BF; }
    .btn-text { font-family: 'Inter', system-ui, sans-serif; font-weight: 700; fill: #FFFFFF; }
  </style>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bg-grad)"/>
  
  <!-- Glowing decorative circles -->
  <circle cx="200" cy="200" r="400" fill="#3B82F6" opacity="0.03" filter="url(#glow)"/>
  <circle cx="1700" cy="800" r="500" fill="#2DD4BF" opacity="0.02" filter="url(#glow)"/>

  <!-- Logo Icon (OsonMed Logo) -->
  <g transform="translate(960, 340) scale(2.8)" filter="url(#drop-shadow)">
    <!-- Outer Ring -->
    <circle cx="0" cy="0" r="40" fill="none" stroke="url(#primary-grad)" stroke-width="8" opacity="0.8"/>
    <!-- Inner Cross/Heart/Pulse -->
    <path d="M -15,0 L 15,0 M 0,-15 L 0,15" stroke="#2DD4BF" stroke-width="8" stroke-linecap="round"/>
    <path d="M -8,-8 L -3,-8 L 0,-14 L 3,-2 L 6,-8 L 10,-8" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Brand Name -->
  <text x="960" y="560" text-anchor="middle" class="title" font-size="100" letter-spacing="-0.03em" filter="url(#drop-shadow)">
    OSON<tspan fill="#3B82F6">MED</tspan>
  </text>

  <!-- Tagline -->
  <text x="960" y="640" text-anchor="middle" class="subtitle" font-size="32" letter-spacing="0.05em">
    AT-HOME DIAGNOSTICS MARKETPLACE FOR CHRONIC PATIENTS
  </text>

  <!-- Market Focus Badge -->
  <g transform="translate(760, 720)" filter="url(#drop-shadow)">
    <rect width="400" height="60" rx="30" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>
    <circle cx="40" cy="30" r="10" fill="#2DD4BF"/>
    <text x="70" y="38" font-family="'Inter', sans-serif" font-weight="700" font-size="20" fill="#FFFFFF">Tashkent, Uzbekistan</text>
  </g>

  <!-- Pitch Hook -->
  <text x="960" y="860" text-anchor="middle" class="title" font-size="36" font-weight="700" fill="url(#teal-grad)">
    "Simplifying healthcare for 1.2M+ chronic patients, one home visit at a time."
  </text>

  <!-- Slide Footer -->
  <rect x="0" y="1040" width="1920" height="40" fill="rgba(15, 23, 42, 0.6)"/>
  <text x="100" y="1066" font-family="sans-serif" font-size="16" fill="#64748B">OsonMed Ideathon Pitch</text>
  <text x="1820" y="1066" font-family="sans-serif" font-size="16" fill="#64748B" text-anchor="end">Slide 1 / 6</text>
</svg>
