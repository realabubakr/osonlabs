<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="100%" height="100%">
  <defs>
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </radialGradient>
    <linearGradient id="teal-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2DD4BF"/>
      <stop offset="100%" stop-color="#0D9488"/>
    </linearGradient>
    <linearGradient id="primary-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <filter id="drop-shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="12" stdDeviation="15" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <style>
    .title { font-family: 'Inter', system-ui, sans-serif; font-weight: 900; fill: #FFFFFF; }
    .card-title { font-family: 'Inter', system-ui, sans-serif; font-weight: 800; fill: #FFFFFF; }
    .body { font-family: 'Inter', system-ui, sans-serif; font-weight: 500; fill: #94A3B8; line-height: 1.5; }
    .accent { fill: #2DD4BF; font-weight: 800; }
    .price { font-family: 'Inter', system-ui, sans-serif; font-weight: 900; fill: #2DD4BF; }
  </style>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bg-grad)"/>

  <!-- Slide Header -->
  <text x="100" y="120" class="title" font-size="56" letter-spacing="-0.02em">
    Business Model: <tspan fill="#3B82F6">15% Commission &amp; Escrow</tspan>
  </text>
  <line x1="100" y1="160" x2="1820" y2="160" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>

  <!-- LEFT COLUMN: Monetization Mechanics -->
  <g transform="translate(100, 220)" filter="url(#drop-shadow)">
    <rect width="840" height="720" rx="24" fill="rgba(15, 23, 42, 0.45)" stroke="rgba(255,255,255,0.05)" stroke-width="1.5"/>
    
    <!-- Revenue Stream 1 -->
    <g transform="translate(60, 60)">
      <text x="0" y="40" class="price" font-size="52" fill="#3B82F6">15% Fee</text>
      <text x="0" y="90" class="card-title" font-size="26">Transactional Commission</text>
      <text x="0" y="130" class="body" font-size="19" width="720">Taken from the laboratory on every successful transaction. Since labs operate at <tspan class="accent">60%–80% gross margins</tspan>, they gladly pay for new patient volume.</text>
    </g>

    <!-- Revenue Stream 2 -->
    <g transform="translate(60, 280)">
      <text x="0" y="40" class="price" font-size="52" fill="#2DD4BF">100% Upfront</text>
      <text x="0" y="90" class="card-title" font-size="26">Escrow Payment (Zero Leakage)</text>
      <text x="0" y="130" class="body" font-size="19">Patients prepay inside the Telegram Mini App. Funds are held in escrow. When the lab uploads the PDF report, 85% is released to the lab, and 15% is kept by OsonMed.</text>
    </g>

    <!-- Revenue Stream 3 -->
    <g transform="translate(60, 500)">
      <text x="0" y="40" class="price" font-size="52" fill="#6366F1">SaaS Portal</text>
      <text x="0" y="90" class="card-title" font-size="26">Dark Lab Infrastructure (Future)</text>
      <text x="0" y="130" class="body" font-size="19">Charging labs for specialized logistics routing and LIS (Laboratory Information System) API integrations to automate their workflows.</text>
    </g>
  </g>

  <!-- RIGHT COLUMN: Win-Win Value Proposition -->
  <g transform="translate(980, 220)" filter="url(#drop-shadow)">
    <rect width="840" height="720" rx="24" fill="rgba(15, 23, 42, 0.45)" stroke="rgba(255,255,255,0.05)" stroke-width="1.5"/>
    
    <text x="60" y="80" class="card-title" font-size="32" fill="#3B82F6">Why Labs Love OsonMed</text>
    
    <!-- Lab value 1 -->
    <g transform="translate(60, 140)">
      <circle cx="25" cy="25" r="8" fill="#2DD4BF"/>
      <text x="50" y="32" class="card-title" font-size="24">Zero Customer Acquisition Cost (CAC)</text>
      <text x="50" y="65" class="body" font-size="18">Labs only pay when they receive a fully paid patient, converting fixed marketing costs into a predictable 15% variable fee.</text>
    </g>

    <!-- Lab value 2 -->
    <g transform="translate(60, 310)">
      <circle cx="25" cy="25" r="8" fill="#2DD4BF"/>
      <text x="50" y="32" class="card-title" font-size="24">Fills Idle Laboratory Capacity</text>
      <text x="50" y="65" class="body" font-size="18">Testing machines are expensive fixed assets. Running the 101st sample has near-zero marginal cost, making OsonMed volume pure profit.</text>
    </g>

    <!-- Lab value 3 -->
    <g transform="translate(60, 480)">
      <circle cx="25" cy="25" r="8" fill="#2DD4BF"/>
      <text x="50" y="32" class="card-title" font-size="24">The "Dark Lab" Revolution</text>
      <text x="50" y="65" class="body" font-size="18">Since OsonMed specializes in home sample collection, partner labs can process tests in cheap, centralized facilities, avoiding expensive high-rent retail clinics.</text>
    </g>
  </g>

  <!-- Slide Footer -->
  <rect x="0" y="1040" width="1920" height="40" fill="rgba(15, 23, 42, 0.6)"/>
  <text x="100" y="1066" font-family="sans-serif" font-size="16" fill="#64748B">OsonMed Ideathon Pitch</text>
  <text x="1820" y="1066" font-family="sans-serif" font-size="16" fill="#64748B" text-anchor="end">Slide 5 / 6</text>
</svg>
