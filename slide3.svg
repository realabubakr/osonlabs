<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="100%" height="100%">
  <defs>
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </radialGradient>
    <linearGradient id="primary-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="teal-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2DD4BF"/>
      <stop offset="100%" stop-color="#0D9488"/>
    </linearGradient>
    <filter id="drop-shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="12" stdDeviation="15" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <style>
    .title { font-family: 'Inter', system-ui, sans-serif; font-weight: 900; fill: #FFFFFF; }
    .card-title { font-family: 'Inter', system-ui, sans-serif; font-weight: 800; fill: #FFFFFF; }
    .body { font-family: 'Inter', system-ui, sans-serif; font-weight: 500; fill: #94A3B8; line-height: 1.5; }
    .accent { fill: #3B82F6; }
    .teal { fill: #2DD4BF; }
  </style>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bg-grad)"/>

  <!-- Slide Header -->
  <text x="100" y="120" class="title" font-size="56" letter-spacing="-0.02em">
    The Solution: <tspan fill="#3B82F6">OsonMed Marketplace</tspan>
  </text>
  <line x1="100" y1="160" x2="1820" y2="160" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>

  <!-- Step 1 Card -->
  <g transform="translate(100, 240)" filter="url(#drop-shadow)">
    <rect width="520" height="660" rx="20" fill="rgba(15, 23, 42, 0.45)" stroke="rgba(255,255,255,0.05)" stroke-width="1.5"/>
    <circle cx="260" cy="110" r="50" fill="rgba(59, 130, 246, 0.15)" stroke="#3B82F6" stroke-width="3"/>
    <text x="260" y="122" font-family="sans-serif" font-size="36" font-weight="900" fill="#3B82F6" text-anchor="middle">1</text>
    
    <text x="260" y="220" class="card-title" font-size="28" text-anchor="middle">Scan Rx or Search</text>
    <text x="50" y="290" class="body" font-size="20">
      <tspan x="260" text-anchor="middle">Patients upload doctor's note.</tspan>
      <tspan x="260" dy="36" text-anchor="middle">Our integrated <tspan fill="#2DD4BF" font-weight="700">Gemini AI</tspan> instantly</tspan>
      <tspan x="260" dy="36" text-anchor="middle">extracts required tests.</tspan>
      <tspan x="260" dy="36" text-anchor="middle">Or, patients manually search</tspan>
      <tspan x="260" dy="36" text-anchor="middle">tests and select packages.</tspan>
    </text>
    <!-- Visual icon indicator -->
    <path d="M 220,520 H 300 M 260,480 V 560" stroke="#3B82F6" stroke-width="6" stroke-linecap="round" opacity="0.3"/>
  </g>

  <!-- Flow Arrow 1 -->
  <path d="M 645,570 L 695,570" stroke="url(#primary-grad)" stroke-width="6" stroke-linecap="round"/>
  <path d="M 685,555 L 700,570 L 685,585" fill="none" stroke="url(#primary-grad)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Step 2 Card -->
  <g transform="translate(720, 240)" filter="url(#drop-shadow)">
    <rect width="520" height="660" rx="20" fill="rgba(15, 23, 42, 0.45)" stroke="rgba(255,255,255,0.05)" stroke-width="1.5"/>
    <circle cx="260" cy="110" r="50" fill="rgba(45, 212, 191, 0.15)" stroke="#2DD4BF" stroke-width="3"/>
    <text x="260" y="122" font-family="sans-serif" font-size="36" font-weight="900" fill="#2DD4BF" text-anchor="middle">2</text>

    <text x="260" y="220" class="card-title" font-size="28" text-anchor="middle">Compare &amp; Choose</text>
    <text x="50" y="290" class="body" font-size="20">
      <tspan x="260" text-anchor="middle">Instantly compare prices across</tspan>
      <tspan x="260" dy="36" text-anchor="middle">Tashkent's top private labs</tspan>
      <tspan x="260" dy="36" text-anchor="middle">(<tspan fill="#FFFFFF" font-weight="700">Intermed, Diyomed, Alpha</tspan>).</tspan>
      <tspan x="260" dy="36" text-anchor="middle">Filter by rating, distance,</tspan>
      <tspan x="260" dy="36" text-anchor="middle">and turnaround time.</tspan>
    </text>
    <path d="M 230,510 L 250,540 L 290,490" fill="none" stroke="#2DD4BF" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="0.3"/>
  </g>

  <!-- Flow Arrow 2 -->
  <path d="M 1265,570 H 1315" stroke="url(#teal-grad)" stroke-width="6" stroke-linecap="round"/>
  <path d="M 1305,555 L 1320,570 L 1305,585" fill="none" stroke="url(#teal-grad)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Step 3 Card -->
  <g transform="translate(1340, 240)" filter="url(#drop-shadow)">
    <rect width="520" height="660" rx="20" fill="rgba(15, 23, 42, 0.45)" stroke="rgba(255,255,255,0.05)" stroke-width="1.5"/>
    <circle cx="260" cy="110" r="50" fill="rgba(99, 102, 241, 0.15)" stroke="#6366F1" stroke-width="3"/>
    <text x="260" y="122" font-family="sans-serif" font-size="36" font-weight="900" fill="#6366F1" text-anchor="middle">3</text>

    <text x="260" y="220" class="card-title" font-size="28" text-anchor="middle">Pin on Yandex.Maps</text>
    <text x="50" y="290" class="body" font-size="20">
      <tspan x="260" text-anchor="middle">Confirm booking, pay 100%</tspan>
      <tspan x="260" dy="36" text-anchor="middle">safely in-app (Escrow),</tspan>
      <tspan x="260" dy="36" text-anchor="middle">and drop a pin on Yandex Map.</tspan>
      <tspan x="260" dy="36" text-anchor="middle">Lab nurse arrives at home,</tspan>
      <tspan x="260" dy="36" text-anchor="middle">draws blood, and uploads PDF.</tspan>
    </text>
    <!-- Map marker icon -->
    <path d="M 260,480 C 240,480 230,495 230,515 C 230,540 260,565 260,565 C 260,565 290,540 290,515 C 290,495 280,480 260,480 Z" fill="none" stroke="#6366F1" stroke-width="5" opacity="0.3"/>
    <circle cx="260" cy="510" r="8" fill="#6366F1" opacity="0.3"/>
  </g>

  <!-- Slide Footer -->
  <rect x="0" y="1040" width="1920" height="40" fill="rgba(15, 23, 42, 0.6)"/>
  <text x="100" y="1066" font-family="sans-serif" font-size="16" fill="#64748B">OsonMed Ideathon Pitch</text>
  <text x="1820" y="1066" font-family="sans-serif" font-size="16" fill="#64748B" text-anchor="end">Slide 3 / 6</text>
</svg>
